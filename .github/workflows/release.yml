name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: xcrun swift --version

      - name: Verify Swift toolchain floor
        run: |
          if ! xcrun swift --version | grep -Eq 'Swift version (6\.[1-9]|[7-9]\.)'; then
            echo "kokoro-edge requires Swift 6.1 or newer"
            exit 1
          fi

      - name: Build staged release artifact
        run: ./Scripts/make-release.sh "${GITHUB_REF_NAME#v}"

      - name: Prepare release notes
        run: |
          archive="$(ls dist/kokoro-edge-*.tar.gz | head -n 1)"
          checksum="$(cut -d' ' -f1 "${archive}.sha256")"
          cat > dist/release-notes.md <<EOF
          kokoro-edge ${GITHUB_REF_NAME}

          SHA256
          ${checksum}

          If hosted ARM64 runners do not expose a Swift 6.1+ toolchain, cut the release locally with ./Scripts/make-release.sh and upload the same artifact manually.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
