schema_version: 1

context:
  name: kokoro-edge
  version: ${{ env.get("PKG_VERSION") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/grej/kokoro-edge/releases/download/v${{ version }}/kokoro-edge-${{ version }}-macos-arm64.tar.gz
  sha256: 1e986835327c461d5ec4c399252e8adb695e99a6fc5322ee1edf4b25d789e579

build:
  number: 0
  skip:
    - not osx
    - not arm64
  script:
    - mkdir -p "$PREFIX/bin" "$PREFIX/lib"
    - cp bin/kokoro-edge "$PREFIX/bin/"
    - cp -R bin/*.bundle "$PREFIX/bin/"
    - cp -R lib/*.framework "$PREFIX/lib/"
    - xattr -cr "$PREFIX/bin/kokoro-edge" 2>/dev/null || true
    - xattr -cr "$PREFIX/bin/"*.bundle 2>/dev/null || true
    - xattr -cr "$PREFIX/lib/"*.framework 2>/dev/null || true

tests:
  - script:
      - kokoro-edge --help

about:
  homepage: https://github.com/grej/kokoro-edge
  repository: https://github.com/grej/kokoro-edge
  license: MIT
  summary: Local voice engine daemon for Apple Silicon
  description: |
    kokoro-edge is a native Swift daemon that wraps the Kokoro-82M TTS model
    via MLX on Apple Silicon. It provides an OpenAI-compatible HTTP API for
    local text-to-speech synthesis. Models download automatically on first use.

    Install with pixi (recommended):
      pixi global install kokoro-edge -c https://conda.anaconda.org/gjennings -c conda-forge
